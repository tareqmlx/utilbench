name: Bug report
description: Report a bug in Utilbench
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Utilbench is fully client-side, so please do **not**
        paste any private data — no tool input/output, files, URLs with query
        strings, or anything you would not post publicly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I…, the tool…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to…
        2. Click…
        3. See…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: textarea
    id: debug-info
    attributes:
      label: Debug info (anonymous, auto-filled)
      description: Paste the auto-filled block from the "Report issue" button, if you used it.
      render: markdown
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed any private data from this report.
          required: true
